<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Installed Skills</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="workspace">
    <section class="app-frame" aria-label="Skill Tidy">
      <div class="window-controls" aria-label="窗口控制">
        <button class="window-dot close" type="button" data-window-control="close" aria-label="关闭窗口"></button>
        <button class="window-dot minimize" type="button" data-window-control="minimize" aria-label="最小化窗口"></button>
        <button class="window-dot zoom" type="button" data-window-control="zoom" aria-label="最大化窗口"></button>
      </div>
      <div class="app-actions" aria-label="全局操作">
        <p class="note" id="updatedAt"></p>
        <button class="refresh-list-btn" id="updateAll" type="button" disabled>一键更新</button>
        <button class="refresh-list-btn" id="refreshList" type="button">刷新</button>
      </div>
      <aside class="sidebar">
        <nav class="mode-nav" id="modeNav" aria-label="Skill 视图导航">
          <button class="mode-item is-active" type="button" data-mode="category">
            <span class="mode-icon" aria-hidden="true">
              <img src="./icon/leixing.svg" alt="">
            </span>
            <span>skill类型</span>
          </button>
          <button class="mode-item" type="button" data-mode="platform" aria-label="agent平台">
            <span class="mode-icon" aria-hidden="true">
              <img src="./icon/pingtai.svg" alt="">
            </span>
            <span>agent平台</span>
          </button>
          <button class="mode-item" type="button" data-mode="source" aria-label="skill来源">
            <span class="mode-icon" aria-hidden="true">
              <img src="./icon/laiyuan.svg" alt="">
            </span>
            <span>skill来源</span>
          </button>
          <button class="mode-item" type="button" data-mode="mine" aria-label="自制skill">
            <span class="mode-icon" aria-hidden="true">
              <img src="./icon/wode.svg" alt="">
            </span>
            <span>自制skill</span>
          </button>
          <div class="mode-separator" aria-hidden="true"></div>
          <button class="mode-item" type="button" data-mode="trash">
            <span class="mode-icon" aria-hidden="true">
              <img src="./icon/bin.svg" alt="">
            </span>
            <span>回收站</span>
          </button>
          <button class="mode-item" type="button" data-mode="settings">
            <span class="mode-icon" aria-hidden="true">
              <img src="./icon/set.svg" alt="">
            </span>
            <span>设置</span>
          </button>
        </nav>
        <div class="sidebar-footer" aria-label="应用信息">
          <div class="sidebar-owner">Brain Wung</div>
          <button class="sidebar-version" type="button" id="showChangelog" aria-label="查看更新日志">
            <span id="sidebarVersionText">Version 0.1.5</span>
            <span class="version-badge" id="sidebarVersionBadge" hidden>NEW</span>
          </button>
        </div>
      </aside>

      <section class="main-pane" id="top">
        <header class="filter-bar">
          <div class="filter-tabs" id="filterTabs" aria-label="筛选项"></div>
        </header>

        <section class="top">
          <div>
            <h1>Installed Skills</h1>
            <p class="summary">按用途类别归纳本机 Skills；刷新列表会重新扫描新增、删除和可更新状态。</p>
          </div>
        </section>

        <section class="stats" id="stats">
          <div class="stat"><strong id="statSelf">6</strong><span>自己做 / 维护</span></div>
          <div class="stat"><strong id="statDownload">16</strong><span>下载 / 第三方</span></div>
          <div class="stat"><strong id="statUpdate">16</strong><span>检测到可更新项</span></div>
        </section>

        <div class="card-scroll" id="cardScroll">
          <div id="sections"></div>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <div class="delete-dialog-overlay" id="deleteDialog" aria-hidden="true">
    <div class="delete-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteDialogTitle">
      <div class="delete-dialog-copy">
        <p class="delete-dialog-title" id="deleteDialogTitle">确认删除 hatch-pet?</p>
        <p class="delete-dialog-desc" id="deleteDialogDesc">会先将该skill移动到备份目录，不会直接永久删除。</p>
      </div>
      <div class="delete-dialog-actions">
        <button class="delete-dialog-btn cancel" type="button" data-delete-dialog-cancel>取消</button>
        <button class="delete-dialog-btn confirm" type="button" data-delete-dialog-confirm>确定</button>
      </div>
    </div>
  </div>
  <script src="./fallback-skills.js"></script>
  <script src="./app.js"></script>
</body>
</html>
