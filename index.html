<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Installed Skills</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --text: #333333;
      --muted: #666666;
      --desc: #999999;
      --weak: #cccccc;
      --line: #eeeeee;
      --header: #f9f9f9;
      --brand: #3e4cc4;
      --link: #447dbd;
      --shadow: 0 0 12px 0 rgba(0, 0, 0, 0.08);
      --canvas-bg: linear-gradient(108deg, #f4f5f6 0%, #eef2f4 48%, #e7edf1 100%);
      --container: 1057px;
      --frame-height: 678px;
      --app-radius: 24px;
      --sidebar: 224px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    body {
      margin: 0;
      background: transparent;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    .workspace {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 0;
      background: transparent;
    }

    .app-frame {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      grid-template-rows: 30px minmax(0, 1fr);
      column-gap: 30px;
      row-gap: 24px;
      width: min(100vw, var(--container));
      height: min(100vh, var(--frame-height));
      min-height: 0;
      margin: 0 auto;
      padding: 24px 30px 30px;
      overflow: hidden;
      background: var(--canvas-bg);
      -webkit-app-region: drag;
      border-radius: var(--app-radius) var(--app-radius) 23px 23px;
      box-shadow: none;
      clip-path: inset(0 round var(--app-radius) var(--app-radius) 23px 23px);
    }

    .window-controls {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 1px;
      height: 30px;
      -webkit-app-region: no-drag;
    }

    .window-dot {
      position: relative;
      display: block;
      width: 12px;
      height: 12px;
      padding: 0;
      border: 0;
      appearance: none;
      border-radius: 50%;
      cursor: default;
    }

    .window-dot.close {
      background: #ff5f57;
      color: #8f1d18;
    }

    .window-dot.minimize {
      background: #ffbd2e;
      color: #9b6a00;
    }

    .window-dot.zoom {
      background: #28c840;
      color: #0b7d24;
    }

    .window-dot::before,
    .window-dot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: 1.5px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.12s ease;
    }

    .window-controls:hover .window-dot::before,
    .window-controls:hover .window-dot::after {
      opacity: 1;
    }

    .window-dot.close::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .window-dot.close::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .window-dot.minimize::after {
      display: none;
    }

    .window-dot.zoom::after {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .sidebar {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      min-height: 0;
      padding: 18px;
      overflow: hidden;
      border-radius: 12px;
      background: #ffffff;
      -webkit-app-region: no-drag;
    }

    .mode-nav {
      display: grid;
      gap: 18px;
    }

    .mode-item {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      height: 38px;
      padding: 0 6px;
      border: 0;
      border-radius: 6px;
      color: #333333;
      background: transparent;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.2;
      text-align: left;
      cursor: default;
      transition: color 0.15s ease, background 0.15s ease;
    }

    .mode-item:hover,
    .mode-item.is-active {
      font-weight: 700;
    }

    .mode-item:hover {
      color: #333333;
      background: #f6f6f8;
    }

    .mode-item.is-active {
      color: #3d4bc4;
      background: #f6f6f8;
    }

    .mode-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      color: #333333;
      flex: 0 0 auto;
    }

    .mode-item.is-active .mode-icon {
      color: #666de2;
    }

    .mode-icon::before {
      content: "";
      display: block;
      width: 20px;
      height: 20px;
      background: currentColor;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
    }

    .mode-icon img {
      display: none;
    }

    .mode-item[data-mode="category"] .mode-icon::before {
      -webkit-mask-image: url("./icon/leixing.svg");
      mask-image: url("./icon/leixing.svg");
    }

    .mode-item[data-mode="platform"] .mode-icon::before {
      -webkit-mask-image: url("./icon/pingtai.svg");
      mask-image: url("./icon/pingtai.svg");
    }

    .mode-item[data-mode="source"] .mode-icon::before {
      -webkit-mask-image: url("./icon/laiyuan.svg");
      mask-image: url("./icon/laiyuan.svg");
    }

    .mode-item[data-mode="mine"] .mode-icon::before {
      -webkit-mask-image: url("./icon/wode.svg");
      mask-image: url("./icon/wode.svg");
    }

    .mode-item[data-mode="trash"] .mode-icon::before {
      -webkit-mask-image: url("./icon/bin.svg");
      mask-image: url("./icon/bin.svg");
    }

    .mode-item[data-mode="settings"] .mode-icon::before {
      -webkit-mask-image: url("./icon/set.svg");
      mask-image: url("./icon/set.svg");
    }

    .mode-separator {
      height: 1px;
      margin: 0 6px;
      background: #eeeeee;
    }

    .sidebar-footer {
      display: grid;
      gap: 3px;
      padding: 0 6px;
      color: #999999;
      font-size: 12px;
      line-height: 1.5;
    }

    .sidebar-owner {
      color: #666666;
      font-size: 13px;
      font-weight: 600;
    }

    .sidebar-version {
      display: flex;
      align-items: center;
      gap: 5px;
      width: fit-content;
      padding: 0;
      border: 0;
      color: #999999;
      background: transparent;
      font-size: 11px;
      font-weight: 400;
      line-height: 1.2;
      text-align: left;
      cursor: default;
    }

    .sidebar-version:hover,
    .sidebar-version.is-active {
      color: #666666;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 16px;
      padding: 0 5px;
      border-radius: 8px;
      color: #e62828;
      background: #ffeded;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.2;
    }

    .version-badge[hidden] {
      display: none;
    }

    .sidebar-version:hover .version-badge,
    .sidebar-version.is-active .version-badge {
      color: #ffffff;
      background: #e62828;
    }

    .main-pane {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    .app-actions {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      min-width: 0;
      -webkit-app-region: no-drag;
    }

    button,
    a,
    input,
    select,
    textarea,
    .skill-card,
    .delete-dialog,
    .toast {
      -webkit-app-region: no-drag;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      flex: 0 0 auto;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      min-height: 30px;
      margin-bottom: 18px;
      overflow: hidden;
    }

    .filter-bar.is-hidden {
      display: none;
    }

    .filter-tabs {
      display: flex;
      align-items: center;
      flex: 1 1 auto;
      gap: 6px;
      width: 100%;
      min-width: 0;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior-inline: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filter-tabs::-webkit-scrollbar {
      display: none;
    }

    .filter-tab {
      display: inline-grid;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      height: 30px;
      padding: 0 12px;
      border: 0;
      border-radius: 6px;
      color: #666666;
      background: transparent;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
      cursor: default;
    }

    .filter-tab::after,
    .filter-tab span {
      grid-area: 1 / 1;
    }

    .filter-tab::after {
      content: attr(data-label);
      font-weight: 700;
      visibility: hidden;
    }

    .filter-tab:hover,
    .filter-tab.is-active {
      color: #333333;
      font-weight: 700;
    }

    .filter-tab.is-active {
      background: #ffffff;
    }

    .note {
      display: none;
      margin: 0;
      color: var(--desc);
      font-size: 12px;
      line-height: 1.5;
      white-space: nowrap;
    }

    .card-scroll {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      padding-right: 0;
      scrollbar-color: #cccccc transparent;
      scrollbar-width: thin;
    }

    .card-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .card-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: #cccccc;
    }

    .card-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .top {
      display: none;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 30px;
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: 0;
    }

    .summary {
      margin: 0;
      color: #666666;
      font-size: 14px;
    }

    .refresh-list-btn {
      min-width: 50px;
      height: 30px;
      padding: 0 12px;
      border: 1px solid #ffffff;
      border-radius: 6px;
      color: #333333;
      background: #ffffff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      cursor: default;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .refresh-list-btn:hover {
      color: #3e4cc4;
      border-color: rgba(62, 76, 196, 0.3);
      background: #f6f7ff;
    }

    .refresh-list-btn.is-loading {
      opacity: 0.72;
      cursor: wait;
    }

    .refresh-list-btn:disabled {
      color: #999999;
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.5);
      cursor: default;
      opacity: 0.72;
    }

    .stats {
      display: none;
    }

    .stat {
      min-height: 72px;
      padding: 18px;
      background: #f9f9f9;
      border-radius: 6px;
    }

    .stat strong {
      display: block;
      color: #333333;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 700;
    }

    .stat span {
      color: #666666;
      font-size: 13px;
    }

    #sections {
      min-height: 100%;
    }

    .state-panel,
    .trash-panel,
    .changelog-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 570px;
      min-height: 0;
      border-radius: 12px;
      background: #ffffff;
      overflow: hidden;
    }

    .changelog-panel {
      align-items: flex-start;
      justify-content: flex-start;
      padding: 30px;
      overflow-y: auto;
      scrollbar-color: #cccccc transparent;
      scrollbar-width: thin;
    }

    .changelog-panel::-webkit-scrollbar,
    .settings-card::-webkit-scrollbar {
      width: 6px;
    }

    .changelog-panel::-webkit-scrollbar-thumb,
    .settings-card::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: #cccccc;
    }

    .changelog-panel::-webkit-scrollbar-track,
    .settings-card::-webkit-scrollbar-track {
      background: transparent;
    }

    .changelog-content {
      width: 100%;
    }

    .changelog-title {
      margin: 0 0 6px;
      color: #333333;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
    }

    .changelog-subtitle {
      margin: 0 0 30px;
      color: #999999;
      font-size: 13px;
      line-height: 1.5;
    }

    .changelog-list {
      display: grid;
      gap: 24px;
    }

    .changelog-item {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 18px;
      padding-bottom: 24px;
      border-bottom: 1px solid #f5f5f5;
    }

    .changelog-item:last-child {
      border-bottom: 0;
    }

    .changelog-version {
      display: grid;
      align-content: start;
      gap: 6px;
    }

    .changelog-version strong {
      color: #333333;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .changelog-version span {
      color: #999999;
      font-size: 12px;
      line-height: 1.5;
    }

    .changelog-update-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 78px;
      height: 30px;
      margin-top: 12px;
      border: 1px solid rgba(62, 76, 196, 0.3);
      border-radius: 6px;
      color: #3e4cc4;
      background: #f6f7ff;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
      cursor: default;
    }

    .changelog-update-btn:hover {
      border-color: rgba(62, 76, 196, 0.5);
      background: #eef0ff;
    }

    .changelog-points {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: #666666;
      font-size: 14px;
      line-height: 1.5;
    }

    .changelog-points li {
      position: relative;
      padding-left: 12px;
    }

    .changelog-points li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 9px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #666de2;
    }

    .state-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      width: min(100%, 360px);
      text-align: center;
    }

    .state-copy {
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    .state-illustration {
      display: block;
      width: 150px;
      height: 158px;
      object-fit: contain;
    }

    .state-text {
      margin: 0;
      color: #333333;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
    }

    .scan-primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 40px;
      border: 0;
      border-radius: 6px;
      color: #ffffff;
      background: #5460cb;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
      cursor: default;
    }

    .scan-primary-btn:hover {
      background: #4c57c4;
    }

    .radar-scan {
      position: relative;
      width: 150px;
      height: 150px;
      margin-bottom: 18px;
    }

    .radar-scan::before,
    .radar-scan::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
    }

    .radar-scan::before {
      z-index: 1;
      border: 1px solid rgba(92, 108, 255, 0.28);
      background:
        linear-gradient(rgba(92, 108, 255, 0.24), rgba(92, 108, 255, 0.24)) 0 50% / 100% 1px no-repeat,
        linear-gradient(90deg, rgba(92, 108, 255, 0.24), rgba(92, 108, 255, 0.24)) 50% 0 / 1px 100% no-repeat,
        radial-gradient(circle at center,
          transparent 0 22px,
          rgba(92, 108, 255, 0.24) 23px,
          transparent 24px 48px,
          rgba(92, 108, 255, 0.24) 49px,
          transparent 50px 74px,
          rgba(84, 96, 203, 0.5) 75px);
    }

    .radar-scan::after {
      z-index: 2;
      transform-origin: 50% 50%;
      background:
        conic-gradient(from 180deg,
          rgba(84, 96, 203, 0) 0deg,
          rgba(84, 96, 203, 0) 180deg,
          rgba(96, 112, 255, 0.42) 360deg),
        linear-gradient(180deg, transparent 0 50%, #5c6cff 50% 100%) 50% 50% / 2px 100% no-repeat;
      animation: scanSpin 1.9s linear infinite;
    }

    .radar-dot {
      position: absolute;
      z-index: 3;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #5c6cff;
      box-shadow: 0 0 0 0 rgba(92, 108, 255, 0.32);
      opacity: 0.62;
      animation: radarBlink 1.65s ease-in-out infinite;
    }

    .radar-dot.is-large {
      width: 9px;
      height: 9px;
      background: #5c6cff;
    }

    .radar-dot.is-large::before {
      content: "";
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      background: rgba(92, 108, 255, 0.16);
      opacity: 0.5;
    }

    .radar-dot.medium {
      width: 7px;
      height: 7px;
    }

    .radar-dot.one {
      left: 35px;
      top: 11px;
      animation-delay: 0s;
    }

    .radar-dot.two {
      right: 33px;
      top: 72px;
      animation-delay: 0.42s;
    }

    .radar-dot.three {
      left: 26px;
      bottom: 30px;
      animation-delay: 0.84s;
    }

    @keyframes scanSpin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes radarBlink {
      0%,
      100% {
        opacity: 0.42;
        transform: scale(0.86);
        box-shadow: 0 0 0 0 rgba(92, 108, 255, 0);
      }
      46% {
        opacity: 1;
        transform: scale(1.12);
        box-shadow: 0 0 0 7px rgba(92, 108, 255, 0.12);
      }
    }

    .section {
      margin-top: 0;
      overflow: hidden;
      scroll-margin-top: 108px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 0 12px;
    }

    .section-title {
      margin: 0;
      color: #333333;
      font-size: 16px;
      line-height: 1.5;
      font-weight: 700;
    }

    .section-meta {
      color: #999999;
      font-size: 13px;
      white-space: nowrap;
    }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .skill-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      height: 178px;
      padding: 20px;
      border-radius: 8px;
      background: #ffffff;
      overflow: hidden;
      transition: box-shadow 0.15s ease;
    }

    .skill-card:hover {
      box-shadow: 0 0 12px 0 rgba(0, 0, 0, 0.08);
    }

    .skill-card.has-github {
      cursor: default;
    }

    .skill-title {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      margin-bottom: 6px;
    }

    .skill-name {
      color: #333333;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    .folder-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      margin-left: auto;
      color: #cccccc;
      text-decoration: none;
      cursor: default;
      transition: color 0.15s ease;
    }

    .folder-link:hover {
      color: var(--link);
    }

    .folder-link svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .folder-link img {
      display: block;
      width: 20px;
      height: 20px;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 9px;
    }

    .desc {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      min-height: 42px;
      max-height: 42px;
      margin: 0 0 18px;
      overflow: hidden;
      color: #666666;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 400;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: auto;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
    }

    .pill.self {
      color: #ff7e5f;
      background: #fff2ef;
    }

    .pill.download {
      color: #4bb8ff;
      background: #edf8ff;
    }

    .pill.builtin {
      color: #5b6fff;

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function folderHref(path) {
      return encodeURI("file://" + path);
    }

    function folderIcon() {
      return `<img src="./icon/articel-manage.svg" alt="">`;
    }

    function repoPathFromCommand(command) {
      const match = String(command || "").match(/^cd\s+(.+?)\s+&&/);
      return match ? match[1] : "";
    }

    function cleanRootPath(value) {
      const text = String(value || "").trim();
      return text.length > 1 ? text.replace(/\/+$/, "") : text;
    }

    function categoryLabel(category) {
      return categoryLabels[category] || category;
    }

    function platformLabel(platform) {
      return platform || "Codex";
    }

    function categoryOptions(baseSkills = skills) {
      const seen = new Set();
      const options = [];
      baseSkills.forEach((item) => {
        if (!item.category || seen.has(item.category)) return;
        seen.add(item.category);
        options.push({
          value: item.category,
          label: categoryLabel(item.category)
        });
      });
      return options;
    }

    function platformOptions() {
      return Array.from(new Set(skills.map((item) => platformLabel(item.platform))))
        .map((platform) => ({ value: platform, label: platform }));
    }

    function sourceOptions() {
      const sourceOrder = ["内置", "下载", "自制"];
      const existing = new Set(skills.map((item) => item.source));
      return sourceOrder
        .filter((source) => existing.has(source))
        .map((source) => ({ value: source, label: source }));
    }

    function baseSkillsForMode() {
      if (activeMode === "settings" || activeMode === "trash" || activeMode === "changelog") return [];
      return activeMode === "mine"
        ? skills.filter((item) => item.source === "自制")
        : skills;
    }

    function filterOptions() {
      if (activeMode === "settings" || activeMode === "trash" || activeMode === "changelog" || scanState !== "ready") return [];
      if (activeMode === "platform") return platformOptions();
      if (activeMode === "source") return sourceOptions();
      return categoryOptions(baseSkillsForMode());
    }

    function syncActiveFilter() {
      const optionValues = filterOptions().map((item) => item.value);
      if (activeFilter !== "all" && !optionValues.includes(activeFilter)) {
        activeFilter = "all";
      }
    }

    function visibleSkills() {
      const items = baseSkillsForMode();
      if (activeFilter === "all") return items;

      if (activeMode === "platform") {
        return items.filter((item) => platformLabel(item.platform) === activeFilter);
      }

      if (activeMode === "source") {
        return items.filter((item) => item.source === activeFilter);
      }

      return items.filter((item) => item.category === activeFilter);
    }

      document.querySelectorAll("#modeNav .mode-item").forEach((item) => {
        item.classList.toggle("is-active", item.dataset.mode === activeMode);

    }

    function renderAppUpdateStatus() {
      const versionText = document.getElementById("sidebarVersionText");
      const badge = document.getElementById("sidebarVersionBadge");
      if (versionText) versionText.textContent = `Version ${appUpdate.currentVersion}`;
      if (badge) badge.hidden = !appUpdate.available;
    }

    function normalizeVersion(value) {
      return String(value || "").trim().replace(/^v/i, "");
    }

    function compareVersions(a, b) {
      const left = normalizeVersion(a).split(".").map((part) => Number(part) || 0);
      const right = normalizeVersion(b).split(".").map((part) => Number(part) || 0);
      const length = Math.max(left.length, right.length);
      for (let index = 0; index < length; index += 1) {
        const diff = (left[index] || 0) - (right[index] || 0);
        if (diff !== 0) return diff;
      }
      return 0;
    }

    async function checkAppUpdate() {
      try {
        const response = await fetch(appUpdate.apiUrl, { cache: "no-store" });
        if (!response.ok) return;
        const result = await response.json();
        const latest = normalizeVersion(result.tag_name || result.name || "");
        if (!latest) return;
        if (compareVersions(latest, appUpdate.currentVersion) > 0) {
          appUpdate.latestVersion = latest;
          appUpdate.releaseUrl = result.html_url || appUpdate.releaseUrl;
          appUpdate.available = true;
        }
        renderAppUpdateStatus();
        if (activeMode === "changelog") renderChangelog();
      } catch (error) {
        // Offline or GitHub API failures should not affect local skill management.
      }
    }

      if (activeMode === "settings" || activeMode === "trash" || activeMode === "changelog" || scanState !== "ready") {

      syncActiveFilter();
      const options = [{ value: "all", label: "全部" }, ...filterOptions()];
      const html = options.map((item) => {

        return `<button class="filter-tab${activeClass}" type="button" data-filter="${escapeHtml(item.value)}" data-label="${label}"><span>${label}</span></button>`;
      }).join("");
      tabs.innerHTML = html;
      keepActiveTabVisible("nearest");

    function renderTrash() {

      renderFilterTabs();

      if (!trashLoaded) {
        document.getElementById("sections").innerHTML = `
          <section class="trash-panel" aria-label="回收站">

            </div>
          </section>

        updateGlobalActions();

        ? `<div class="skill-grid">${trashSkills.map(trashCardMarkup).join("")}</div>`
        : `
          <section class="trash-panel" aria-label="回收站">
            <div class="state-content">
              <div class="state-copy">
                <img class="state-illustration" src="./icon/空状态.png" alt="">
                <p class="state-text">回收站暂无内容</p>
              </div>
            </div>
          </section>

      updateGlobalActions();

                </div>

                  <li>首次使用由用户手动扫描，之后打开会优先读取上次缓存。</li>

    function renderSettingsLoading() {
      document.getElementById("sections").innerHTML = `
        <section class="settings-panel">
          <div class="settings-card">
            <h2 class="settings-title">正在读取目录设置</h2>
            <p class="settings-desc">请稍候。</p>
          </div>
        </section>
      `;
    }

    function renderSettings() {
      renderModeNav();
      renderFilterTabs();

      const rows = settingsRoots.map((item, index) => `
        <div class="settings-row" data-settings-index="${index}">
          <div>
            <div class="settings-path" title="${escapeHtml(item.path)}">${escapeHtml(item.path)}</div>
            <div class="settings-meta">
              <span class="settings-tag">${escapeHtml(item.platform || "自定义")}</span>
              <span class="settings-tag">${escapeHtml(item.source || "自定义")}</span>
              ${item.pending ? `<span class="settings-tag">待保存</span>` : item.exists ? "" : `<span class="settings-tag warn">不存在</span>`}
              ${item.builtin ? `<span class="settings-tag">内置</span>` : ""}
            </div>
          </div>
          <div class="settings-actions">
            <input class="settings-toggle" type="checkbox" ${item.enabled ? "checked" : ""} aria-label="启用目录">

      document.getElementById("sections").innerHTML = `
        <section class="settings-panel">
          <div class="settings-card">
            <div class="settings-head">
              <div>
                <h2 class="settings-title">Skill 扫描目录</h2>
                <p class="settings-desc">管理本机各 agent 的 skill 根目录，保存后可点击刷新更新列表。</p>
              </div>
              <button class="settings-btn primary" type="button" id="saveSettings">保存</button>
            </div>
            <div class="settings-form">
              <input class="settings-input" id="newRootPath" type="text" placeholder="新增目录路径，例如 ~/.custom/skills">
              <select class="settings-select" id="newRootPlatform">
                <option>Codex</option>
                <option>Claude</option>
                <option>Claude Code</option>
                <option>Cursor</option>
                <option>Windsurf</option>
                <option>Continue</option>
                <option>Gemini</option>
                <option>OpenCode</option>
                <option>自定义</option>
              </select>
              <button class="settings-btn" type="button" id="addRoot">添加</button>
            </div>
            <div class="settings-list">
              ${rows || `<p class="settings-desc">暂无目录。</p>`}
            </div>
          </div>
        </section>
      `;
      renderStats();
      updateGlobalActions();
    }

    function renderStats() {
      if (!document.getElementById("statSelf")) return;
      const items = visibleSkills();
      const selfCount = items.filter((item) => item.source === "自制").length;
      const downloadCount = items.filter((item) => item.source === "下载").length;
      const updateCount = items.filter((item) => String(item.status).startsWith("可更新")).length;

      document.getElementById("statSelf").textContent = selfCount;
      document.getElementById("statDownload").textContent = downloadCount;
      document.getElementById("statUpdate").textContent = updateCount;
    }

    function renderUpdatedAt(value) {
      if (!value) return;
      const date = new Date(value);
      const text = Number.isNaN(date.getTime())
        ? value
        : date.toLocaleString("zh-CN", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
          });
      document.getElementById("updatedAt").textContent = "更新时间：" + text;
    }

    function renderLoading() {
      renderStatePanel("scanning");
    }

    function cardMarkup(item) {
      const hasUpdate = item.status.startsWith("可更新");
      const blockedByLocalChanges = hasUpdate && item.status.includes("本地有改动");
      const statusTag = item.status === item.source
        ? ""
        : `<span class="status ${hasUpdate ? "update" : "clean"}">${escapeHtml(item.status)}</span>`;
      const repoPath = repoPathFromCommand(item.command);
      const githubUrl = item.githubUrl || "";
      const cardClass = githubUrl ? "skill-card has-github" : "skill-card";
      const cardAttrs = githubUrl
        ? ` data-github-url="${escapeHtml(githubUrl)}" title="打开 GitHub 仓库"`
        : "";
      const action = blockedByLocalChanges
        ? `<button class="update-btn" disabled title="请先处理本地改动">更新</button>`
        : hasUpdate
        ? `<button class="update-btn" data-command="${escapeHtml(item.command)}" data-repo="${escapeHtml(repoPath)}">更新</button>`
        : `<button class="update-btn" disabled>更新</button>`;
      const deleteAction = item.deletable
        ? `<button class="delete-btn" data-path="${escapeHtml(item.path)}" data-name="${escapeHtml(item.name)}">删除</button>`
        : "";

      return `
        <article class="${cardClass}"${cardAttrs}>
          <div class="skill-title">
            <span class="skill-name">${escapeHtml(item.name)}</span>
            <a class="folder-link" href="${folderHref(item.path)}" target="_blank" data-path="${escapeHtml(item.path)}" title="打开所在文件夹：${escapeHtml(item.path)}">${folderIcon()}</a>
          </div>
          <div class="tag-row">
            <span class="platform ${platformClass[item.platform || "Codex"] || ""}">${escapeHtml(item.platform || "Codex")}</span>
            <span class="pill ${sourceClass[item.source]}">${escapeHtml(item.source)}</span>
            ${statusTag}
          </div>
          <p class="desc">${escapeHtml(item.desc)}</p>
          <div class="card-actions">
            ${action}
            ${deleteAction}
          </div>
        </article>
      `;
    }

    function trashCardMarkup(item) {
      const statusTag = `<span class="status clean">${escapeHtml(item.status || "已删除")}</span>`;
      const restoreAction = item.restorable
        ? `<button class="update-btn restore-btn" data-restore-path="${escapeHtml(item.path)}">恢复</button>`
        : `<button class="update-btn" disabled>恢复</button>`;

      return `
        <article class="skill-card">
          <div class="skill-title">
            <span class="skill-name">${escapeHtml(item.name)}</span>
            <a class="folder-link" href="${folderHref(item.path)}" target="_blank" data-path="${escapeHtml(item.path)}" title="打开备份文件夹：${escapeHtml(item.path)}">${folderIcon()}</a>
          </div>
          <div class="tag-row">
            <span class="platform ${platformClass[item.platform || "Codex"] || ""}">${escapeHtml(item.platform || "Codex")}</span>
            <span class="pill ${sourceClass[item.source] || ""}">${escapeHtml(item.source || "自制")}</span>
            ${statusTag}
          </div>
          <p class="desc">${escapeHtml(item.desc)}</p>
          <div class="card-actions">
            ${restoreAction}
          </div>
        </article>
      `;
    }

    function render() {
      if (activeMode === "changelog") {
        renderChangelog();
        return;
      }

      if (activeMode === "trash") {
        renderTrash();
        return;
      }

      if (activeMode === "settings") {
        renderSettings();
        return;
      }

      if (scanState !== "ready") {
        renderStatePanel(scanState);
        return;
      }

      renderModeNav();
      renderFilterTabs();

      const items = visibleSkills();
      const html = items.length
        ? `<div class="skill-grid">${items.map(cardMarkup).join("")}</div>`
        : `
          <div class="skill-grid">
            <article class="skill-card">
              <div class="skill-title">
                <span class="skill-name">暂无内容</span>
              </div>
              <div class="tag-row">
                <span class="status clean">0 个</span>
              </div>
              <p class="desc">当前筛选条件下没有找到对应的 skill。</p>
            </article>
          </div>
        `;

      document.getElementById("sections").innerHTML = html;
      renderStats();
      updateGlobalActions();
    }

    function bindScrollSpy() {
      renderModeNav();
    }

    function scrollCardsToTop() {
      const scroller = document.getElementById("cardScroll");
      if (scroller) scroller.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    async function loadCachedSkills() {
      try {
        if (location.protocol === "file:") {
          return false;
        }

        const response = await fetch("/api/skills-cache", { cache: "no-store" });
        const cached = await response.json();
        if (!response.ok || !cached.ok || !cached.hasCache || !Array.isArray(cached.skills)) return false;
        skills = cached.skills;
        hasSkillData = true;
        scanState = skills.length ? "ready" : "empty";
        if (cached.updatedAt) renderUpdatedAt(cached.updatedAt);
        return true;
      } catch (error) {
        return false;
      }
    }

    async function cacheSkills(result) {
      try {
        if (location.protocol === "file:") return;
        await fetch("/api/skills-cache", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            skills: result.skills || [],
            updatedAt: result.updatedAt || new Date().toISOString()
          })
        });
      } catch (error) {
        // Ignore cache failures; the app can still render from the live scan.
      }
    }

    async function persistCurrentSkills() {
      await cacheSkills({
        skills,
        updatedAt: new Date().toISOString()
      });
    }

    function markRepoUpdated(repo) {
      let changed = false;
      skills = skills.map((item) => {
        const itemRepo = repoPathFromCommand(item.command);
        if (itemRepo !== repo) return item;
        changed = true;
        return {
          ...item,
          status: "已是最新",
          command: undefined
        };
      });
      return changed;
    }

    function confirmDelete(name) {
      const dialog = document.getElementById("deleteDialog");
      const title = document.getElementById("deleteDialogTitle");
      title.textContent = `确认删除 ${name}?`;
      dialog.classList.add("is-open");
      dialog.setAttribute("aria-hidden", "false");

      return new Promise((resolve) => {
        const close = (value) => {
          dialog.classList.remove("is-open");
          dialog.setAttribute("aria-hidden", "true");
          dialog.removeEventListener("click", onClick);
          document.removeEventListener("keydown", onKeydown);
          resolve(value);
        };

        const onClick = (event) => {
          if (event.target === dialog || event.target.closest("[data-delete-dialog-cancel]")) {
            close(false);
            return;
          }
          if (event.target.closest("[data-delete-dialog-confirm]")) {
            close(true);
          }
        };

        const onKeydown = (event) => {
          if (event.key === "Escape") {
            close(false);
          }
        };

        dialog.addEventListener("click", onClick);
        document.addEventListener("keydown", onKeydown);
      });
    }

    function skillIdentityKey(item) {
      return item.path || `${item.platform || ""}|${item.name || ""}|${item.folder || ""}`;
    }

    async function refreshSkills(options = {}) {
      const button = document.getElementById("refreshList");
      const useButtonState = !options.background;
      const showScanPanel = Boolean(options.showScanPanel);
      const previousKeys = new Set(skills.map(skillIdentityKey));
      if (location.protocol === "file:") {
        showToast("需要通过本地服务打开，才能重新扫描 skill 目录");
        return;
      }

      if (showScanPanel) {
        scanState = "scanning";
        scanProgress = 10;
        render();
        startScanProgress();
      }

      if (useButtonState) {
        button.classList.add("is-loading");
        button.disabled = true;
        button.textContent = showScanPanel ? "扫描中" : "刷新中";
      }

      try {
        const response = await fetch("/api/skills", { cache: "no-store" });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "刷新失败");
        }
        const nextSkills = result.skills || [];
        const addedCount = nextSkills.filter((item) => !previousKeys.has(skillIdentityKey(item))).length;
        skills = nextSkills;
        hasSkillData = true;
        scanState = skills.length ? "ready" : "empty";
        await cacheSkills(result);
        render();
        renderUpdatedAt(result.updatedAt);
        bindScrollSpy();
        if (!options.silent) {
          showToast(showScanPanel
            ? `扫描完成，共 ${skills.length} 条数据`
            : `已刷新，新增 ${addedCount} 条数据`);
        }
      } catch (error) {
        scanState = hasSkillData ? (skills.length ? "ready" : "empty") : "initial";
        if (!options.silent) {
          showToast(error.message || "刷新失败");
        }
        render();
        bindScrollSpy();
      } finally {
        stopScanProgress();
        if (useButtonState) {
          button.classList.remove("is-loading");
          button.disabled = false;
          button.textContent = "刷新";
        }
        updateGlobalActions();
      }
    }

    async function updateAllSkills() {
      const button = document.getElementById("updateAll");
      const targets = skills
        .filter((item) => {
          const status = String(item.status || "");
          return status.startsWith("可更新") && !status.includes("本地有改动") && item.command;
        })
        .map((item) => ({ name: item.name, repo: repoPathFromCommand(item.command) }))
        .filter((item) => item.repo);

      if (!targets.length) {
        showToast("当前没有可更新的 skill");
        updateGlobalActions();
        return;
      }

      if (location.protocol === "file:") {
        showToast("需要通过本地服务打开，才能一键更新");
        return;
      }

      button.disabled = true;
      button.classList.add("is-loading");

      try {
        for (let index = 0; index < targets.length; index += 1) {
          button.textContent = `更新中 ${index + 1}/${targets.length}`;
          const response = await fetch("/api/update", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ repo: targets[index].repo })
          });
          const result = await response.json();
          if (!response.ok || !result.ok) {
            throw new Error(`${targets[index].name} 更新失败：${result.message || "未知错误"}`);
          }
          markRepoUpdated(targets[index].repo);
        }
        await persistCurrentSkills();
        render();
        showToast("可更新的 skill 已处理完成，可点击刷新重新检查");
      } catch (error) {
        showToast(error.message || "一键更新失败");
      } finally {
        button.classList.remove("is-loading");
        updateGlobalActions();
      }
    }

    async function loadTrash() {
      if (location.protocol === "file:") {
        showToast("需要通过本地服务打开，才能读取回收站");
        trashLoaded = true;
        trashSkills = [];
        renderTrash();
        return;
      }

      trashLoaded = false;
      renderTrash();
      try {
        const response = await fetch("/api/trash", { cache: "no-store" });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "读取回收站失败");
        }
        trashSkills = result.skills || [];
        trashLoaded = true;
        renderTrash();
      } catch (error) {
        showToast(error.message || "读取回收站失败");
        trashSkills = [];
        trashLoaded = true;
        renderTrash();
      }
    }

    async function loadSettings() {
      if (location.protocol === "file:") {
        showToast("需要通过本地服务打开，才能读取设置");
        return;
      }

      renderSettingsLoading();
      try {
        const response = await fetch("/api/settings", { cache: "no-store" });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "读取设置失败");
        }
        settingsRoots = result.roots || [];
        settingsLoaded = true;
        renderSettings();
      } catch (error) {
        showToast(error.message || "读取设置失败");
        settingsLoaded = true;
        settingsRoots = [];
        renderSettings();
      }
    }

    async function saveSettings() {
      if (location.protocol === "file:") {
        showToast("需要通过本地服务打开，才能保存设置");
        return;
      }

      try {
        const response = await fetch("/api/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ roots: settingsRoots })
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "保存失败");
        }
        settingsRoots = result.roots || [];
        activeMode = "settings";
        renderSettings();
        showToast("目录设置已保存，需要更新列表时请点击刷新");
      } catch (error) {
        showToast(error.message || "保存失败");
      }
    }

    document.getElementById("refreshList").addEventListener("click", () => refreshSkills());
    document.getElementById("updateAll").addEventListener("click", () => updateAllSkills());
    document.querySelector(".window-controls").addEventListener("click", (event) => {
      const button = event.target.closest("[data-window-control]");
      if (!button) return;
      window.skillTidyWindow?.control(button.dataset.windowControl);
    });
    document.getElementById("showChangelog").addEventListener("click", () => {
      activeMode = "changelog";
      activeFilter = "all";
      render();
      scrollCardsToTop();
    });

    document.getElementById("modeNav").addEventListener("click", (event) => {
      const button = event.target.closest(".mode-item[data-mode]");
      if (!button) return;
      activeMode = button.dataset.mode || "category";
      activeFilter = "all";
      if (activeMode === "settings" && !settingsLoaded) {
        renderModeNav();
        renderFilterTabs();
        loadSettings();
        scrollCardsToTop();
        return;
      }
      if (activeMode === "trash") {
        loadTrash();
        scrollCardsToTop();
        return;
      }
      render();
      bindScrollSpy();
      scrollCardsToTop();
    });

    document.getElementById("filterTabs").addEventListener("click", (event) => {
      const button = event.target.closest(".filter-tab[data-filter]");
      if (!button) return;
      activeFilter = button.dataset.filter || "all";
      render();
      bindScrollSpy();
      keepActiveTabVisible("center");
      scrollCardsToTop();
    });

    document.getElementById("filterTabs").addEventListener("wheel", (event) => {
      const tabs = event.currentTarget;
      if (Math.abs(event.deltaY) <= Math.abs(event.deltaX)) return;
      if (tabs.scrollWidth <= tabs.clientWidth) return;
      event.preventDefault();
      tabs.scrollLeft += event.deltaY;
    }, { passive: false });

    document.addEventListener("click", async (event) => {
      const folderLink = event.target.closest(".folder-link[data-path]");
      if (folderLink && location.protocol !== "file:") {
        event.preventDefault();
        event.stopPropagation();

        try {
          const response = await fetch("/api/open-path", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: folderLink.dataset.path })
          });
          const result = await response.json();
          if (!response.ok || !result.ok) {
            throw new Error(result.message || "打开失败");
          }
        } catch (error) {
          showToast(error.message || "打开失败");
        }
        return;
      }

      const startScanButton = event.target.closest("#startScan");
      if (startScanButton) {
        refreshSkills({ showScanPanel: true });
        return;
      }

      const appUpdateButton = event.target.closest("#appUpdateNow");
      if (appUpdateButton) {
        if (appUpdate.available) {
          window.open(appUpdate.releaseUrl, "_blank", "noopener");
        }
        return;
      }

      const addRootButton = event.target.closest("#addRoot");
      if (addRootButton) {
        const input = document.getElementById("newRootPath");
        const platform = document.getElementById("newRootPlatform").value || "自定义";
        const rootPath = cleanRootPath(input.value);
        if (!rootPath) {
          showToast("请先填写目录路径");
          input.focus();
          return;
        }

        const exists = settingsRoots.some((item) => cleanRootPath(item.path) === rootPath);
        if (exists) {
          showToast("这个目录已经在列表里了");
          input.focus();
          return;
        }

        settingsRoots.push({
          path: rootPath,
          platform,
          source: "自定义",
          builtin: false,
          deletable: true,
          enabled: true,
          pending: true
        });
        input.value = "";
        renderSettings();
        return;
      }

      const removeRootButton = event.target.closest("[data-remove-root]");
      if (removeRootButton) {
        const index = Number(removeRootButton.dataset.removeRoot);
        if (!Number.isNaN(index)) {
          settingsRoots.splice(index, 1);
          renderSettings();
        }
        return;
      }

      const saveSettingsButton = event.target.closest("#saveSettings");
      if (saveSettingsButton) {
        saveSettingsButton.disabled = true;
        saveSettingsButton.textContent = "保存中";
        try {
          await saveSettings();
        } finally {
          const currentButton = document.getElementById("saveSettings");
          if (currentButton) {
            currentButton.disabled = false;
            currentButton.textContent = "保存";
          }
        }
        return;
      }

      const restoreButton = event.target.closest(".restore-btn[data-restore-path]");
      if (restoreButton) {
        if (location.protocol === "file:") {
          showToast("需要通过本地服务打开，才能恢复 skill");
          return;
        }

        restoreButton.classList.add("is-loading");
        restoreButton.disabled = true;
        restoreButton.textContent = "恢复中";

        try {
          const response = await fetch("/api/restore", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: restoreButton.dataset.restorePath })
          });
          const result = await response.json();
          if (!response.ok || !result.ok) {
            throw new Error(result.message || "恢复失败");
          }

          trashSkills = trashSkills.filter((item) => item.path !== restoreButton.dataset.restorePath);
          if (result.skill) {
            skills = [
              ...skills.filter((item) => item.path !== result.skill.path),
              result.skill
            ];
            hasSkillData = true;
            scanState = "ready";
            await persistCurrentSkills();
          }
          showToast("已恢复到原安装目录");
          renderTrash();
        } catch (error) {
          showToast(error.message || "恢复失败");
          restoreButton.disabled = false;
          restoreButton.textContent = "恢复";
        } finally {
          restoreButton.classList.remove("is-loading");
        }
        return;
      }

      const card = event.target.closest(".skill-card[data-github-url]");
      if (card && !event.target.closest("a, button")) {
        window.open(card.dataset.githubUrl, "_blank", "noopener");
        return;
      }

      const deleteButton = event.target.closest(".delete-btn[data-path]");
      if (deleteButton) {
        const name = deleteButton.dataset.name || "这个 skill";
        const confirmed = await confirmDelete(name);
        if (!confirmed) return;

        if (location.protocol === "file:") {
          showToast("需要通过本地服务打开，才能删除 skill");
          return;
        }

        deleteButton.classList.add("is-loading");
        deleteButton.disabled = true;
        deleteButton.textContent = "删除中";

        try {
          const response = await fetch("/api/delete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: deleteButton.dataset.path })
          });
          const result = await response.json();
          if (!response.ok || !result.ok) {
            throw new Error(result.message || "删除失败");
          }
          showToast("已删除并移动到备份目录");
          skills = skills.filter((item) => item.path !== deleteButton.dataset.path);
          trashLoaded = false;
          scanState = skills.length ? "ready" : "empty";
          await persistCurrentSkills();
          render();
        } catch (error) {
          showToast(error.message || "删除失败");
          deleteButton.disabled = false;
          deleteButton.textContent = "删除";
        } finally {
          deleteButton.classList.remove("is-loading");
        }
        return;
      }

      const button = event.target.closest(".update-btn[data-command]");
      if (!button) return;
      const command = button.dataset.command;
      const repo = button.dataset.repo;

      if (location.protocol === "file:") {
        try {
          await navigator.clipboard.writeText(command);
          showToast("静态打开不能直接更新，已复制命令：" + command);
        } catch (error) {
          showToast(command);
        }
        return;
      }

      button.classList.add("is-loading");
      button.disabled = true;
      button.textContent = "更新中";

      try {
        const response = await fetch("/api/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ repo })
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "更新失败");
        }
        showToast(result.message || "更新完成");
        markRepoUpdated(repo);
        await persistCurrentSkills();
        render();
      } catch (error) {
        showToast(error.message || "更新失败");
        button.disabled = false;
        button.textContent = "更新";
      } finally {
        button.classList.remove("is-loading");
      }
    });

    document.addEventListener("change", (event) => {
      const toggle = event.target.closest(".settings-toggle");
      if (!toggle) return;
      const row = toggle.closest("[data-settings-index]");
      const index = Number(row?.dataset.settingsIndex);
      if (Number.isNaN(index) || !settingsRoots[index]) return;
      settingsRoots[index].enabled = toggle.checked;
    });

    renderAppUpdateStatus();
    loadCachedSkills().then((loaded) => {
      if (!loaded) {
        scanState = "initial";
      }
      render();
      bindScrollSpy();
    });
    checkAppUpdate();
  </script>
</body>
</html>
