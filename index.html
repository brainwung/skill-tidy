<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Installed Skills</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --panel: #ffffff;
      --text: #333333;
      --muted: #666666;
      --desc: #999999;
      --weak: #cccccc;
      --line: #eeeeee;
      --header: #f9f9f9;
      --brand: #3e4cc4;
      --link: #447dbd;
      --shadow: 0 0 12px 0 rgba(0, 0, 0, 0.08);
      --canvas-bg: linear-gradient(108deg, #f4f5f6 0%, #eef2f4 48%, #e7edf1 100%);
      --container: 1057px;
      --sidebar: 224px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--canvas-bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    .workspace {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 0;
      background: var(--canvas-bg);
    }

    .app-frame {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      grid-template-rows: 30px minmax(0, 1fr);
      column-gap: 30px;
      row-gap: 18px;
      width: min(100vw, var(--container));
      height: min(100vh, 678px);
      min-height: 0;
      margin: 0 auto;
      padding: 24px 30px 30px;
      overflow: hidden;
      background: var(--canvas-bg);
      -webkit-app-region: drag;
    }

    .app-logo {
      display: block;
      grid-column: 1 / -1;
      width: 188px;
      height: 30px;
      object-fit: contain;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      min-height: 0;
      padding: 18px;
      overflow: hidden;
      border-radius: 10px;
      background: #ffffff;
      -webkit-app-region: no-drag;
    }

    .mode-nav {
      display: grid;
      gap: 12px;
    }

    .mode-item {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      height: 38px;
      padding: 0 6px;
      border: 0;
      border-radius: 6px;
      color: #333333;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.2;
      text-align: left;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease;
    }

    .mode-item:hover,
    .mode-item.is-active {
      font-weight: 700;
    }

    .mode-item:hover {
      color: #333333;
      background: #f6f6f8;
    }

    .mode-item.is-active {
      color: #3d4bc4;
      background: #f6f6f8;
    }

    .mode-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      color: #333333;
      flex: 0 0 auto;
    }

    .mode-item.is-active .mode-icon {
      color: #666de2;
    }

    .mode-icon::before {
      content: "";
      display: block;
      width: 20px;
      height: 20px;
      background: currentColor;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
    }

    .mode-icon img {
      display: none;
    }

    .mode-item[data-mode="category"] .mode-icon::before {
      -webkit-mask-image: url("./icon/leixing.svg");
      mask-image: url("./icon/leixing.svg");
    }

    .mode-item[data-mode="platform"] .mode-icon::before {
      -webkit-mask-image: url("./icon/pingtai.svg");
      mask-image: url("./icon/pingtai.svg");
    }

    .mode-item[data-mode="source"] .mode-icon::before {
      -webkit-mask-image: url("./icon/laiyuan.svg");
      mask-image: url("./icon/laiyuan.svg");
    }

    .mode-item[data-mode="mine"] .mode-icon::before {
      -webkit-mask-image: url("./icon/wode.svg");
      mask-image: url("./icon/wode.svg");
    }

    .mode-item[data-mode="settings"] .mode-icon::before {
      -webkit-mask-image: url("./icon/set.svg");
      mask-image: url("./icon/set.svg");
    }

    .mode-separator {
      height: 1px;
      margin: 0 6px;
      background: #eeeeee;
    }

    .sidebar-footer {
      display: grid;
      gap: 3px;
      padding: 0 6px;
      color: #999999;
      font-size: 12px;
      line-height: 1.5;
    }

    .sidebar-owner {
      color: #666666;
      font-size: 13px;
      font-weight: 600;
    }

    .sidebar-version {
      color: #999999;
      font-size: 12px;
      font-weight: 400;
    }

    .main-pane {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    button,
    a,
    input,
    select,
    textarea,
    .skill-card,
    .delete-dialog,
    .toast {
      -webkit-app-region: no-drag;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
      flex: 0 0 auto;
      min-height: 30px;
      margin-bottom: 18px;
    }

    .filter-bar.is-hidden {
      display: none;
    }

    .filter-tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-tabs::-webkit-scrollbar {
      display: none;
    }

    .filter-tab {
      display: inline-grid;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      height: 30px;
      padding: 0 12px;
      border: 0;
      border-radius: 6px;
      color: #666666;
      background: transparent;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
      cursor: pointer;
    }

    .filter-tab::after,
    .filter-tab span {
      grid-area: 1 / 1;
    }

    .filter-tab::after {
      content: attr(data-label);
      font-weight: 700;
      visibility: hidden;
    }

    .filter-tab:hover,
    .filter-tab.is-active {
      color: #333333;
      font-weight: 700;
    }

    .filter-tab.is-active {
      background: #ffffff;
    }

    .filter-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
    }

    .note {
      display: none;
      margin: 0;
      color: var(--desc);
      font-size: 12px;
      line-height: 1.5;
      white-space: nowrap;
    }

    .card-scroll {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      padding-right: 0;
      scrollbar-color: #cccccc transparent;
      scrollbar-width: thin;
    }

    .card-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .card-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: #cccccc;
    }

    .card-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .top {
      display: none;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 30px;
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: 0;
    }

    .summary {
      margin: 0;
      color: #666666;
      font-size: 14px;
    }

    .refresh-list-btn {
      min-width: 50px;
      height: 30px;
      padding: 0 12px;
      border: 1px solid #ffffff;
      border-radius: 6px;
      color: #333333;
      background: #ffffff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .refresh-list-btn:hover {
      color: #3e4cc4;
      border-color: rgba(62, 76, 196, 0.3);
      background: #f6f7ff;
    }

    .refresh-list-btn.is-loading {
      opacity: 0.72;
      cursor: wait;
    }

    .stats {
      display: none;
    }

    .stat {
      min-height: 72px;
      padding: 18px;
      background: #f9f9f9;
      border-radius: 6px;
    }

    .stat strong {
      display: block;
      color: #333333;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 700;
    }

    .stat span {
      color: #666666;
      font-size: 13px;
    }

    #sections {
      min-height: 100%;
    }

    .section {
      margin-top: 0;
      overflow: hidden;
      scroll-margin-top: 108px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 0 12px;
    }

    .section-title {
      margin: 0;
      color: #333333;
      font-size: 16px;
      line-height: 1.5;
      font-weight: 700;
    }

    .section-meta {
      color: #999999;
      font-size: 13px;
      white-space: nowrap;
    }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .skill-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      height: 178px;
      padding: 20px;
      border-radius: 8px;
      background: #ffffff;
      overflow: hidden;
      transition: box-shadow 0.15s ease;
    }

    .skill-card:hover {
      box-shadow: 0 0 12px 0 rgba(0, 0, 0, 0.08);
    }

    .skill-card.has-github {
      cursor: pointer;
    }

    .skill-title {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      margin-bottom: 6px;
    }

    .skill-name {
      color: #333333;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    .folder-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      margin-left: auto;
      color: #cccccc;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .folder-link:hover {
      color: var(--link);
    }

    .folder-link svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .folder-link img {
      display: block;
      width: 20px;
      height: 20px;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 9px;
    }

    .desc {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      min-height: 42px;
      max-height: 42px;
      margin: 0 0 18px;
      overflow: hidden;
      color: #666666;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 400;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: auto;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
    }

    .pill.self {
      color: #ff7e5f;
      background: #fff2ef;
    }

    .pill.download {
      color: #4bb8ff;
      background: #edf8ff;
    }

    .pill.builtin {
      color: #5b6fff;
      background: #eef0ff;
    }

    .platform {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: auto;
      padding: 3px 6px;
      border-radius: 3px;
      color: #666666;
      background: #f5f5f5;
      font-size: 11px;
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
    }

    .platform.codex {
      color: #447dbd;
      background: #e6f2fe;
    }

    .platform.claude {
      color: #6c3914;
      background: #ffdfcb;
    }

    .platform.claude-code {
      color: #fd7807;
      background: #fff4e7;
    }

    .platform.cursor,
    .platform.windsurf,
    .platform.continue,
    .platform.gemini,
    .platform.opencode {
      color: #4d73c5;
      background: #f1f5fe;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: auto;
      padding: 3px 6px;
      border-radius: 3px;
      color: #999999;
      background: #f2f4f7;
      font-size: 11px;
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
    }

    .status.update {
      color: #ffad44;
      background: #fff4e7;
    }

    .status.clean {
      color: #4d73c5;
      background: #f1f5fe;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: auto;
    }

    .update-btn {
      min-width: 51px;
      height: 24px;
      border: 1px solid rgba(62, 76, 196, 0.3);
      border-radius: 3px;
      color: #3e4cc4;
      background: #f6f7ff;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .update-btn:hover:not(:disabled) {
      color: #3e4cc4;
      border-color: rgba(62, 76, 196, 0.3);
      background: #f6f7ff;
    }

    .delete-btn {
      min-width: 51px;
      height: 24px;
      border: 1px solid #eeeeee;
      border-radius: 3px;
      color: #999999;
      background: #f9f9f9;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
      cursor: pointer;
    }

    .delete-btn:hover {
      color: #e62828;
      border-color: #ffd1cc;
      background: #fff7f6;
    }

    .update-btn.is-loading,
    .delete-btn.is-loading {
      opacity: 0.72;
      cursor: wait;
    }

    .update-btn:disabled {
      color: #999999;
      background: #f5f5f5;
      border-color: #eeeeee;
      cursor: default;
    }

    .settings-panel {
      display: grid;
      gap: 18px;
      min-height: 100%;
      padding: 0;
    }

    .settings-card {
      padding: 24px;
      border-radius: 8px;
      background: #ffffff;
    }

    .settings-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .settings-title {
      margin: 0;
      color: #333333;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .settings-desc {
      margin: 6px 0 0;
      color: #666666;
      font-size: 13px;
      line-height: 1.5;
    }

    .settings-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px 72px;
      gap: 12px;
      margin-bottom: 24px;
    }

    .settings-input,
    .settings-select {
      height: 30px;
      min-width: 0;
      padding: 0 12px;
      border: 1px solid #eeeeee;
      border-radius: 6px;
      color: #333333;
      background: #ffffff;
      font-size: 12px;
      outline: 0;
    }

    .settings-input:focus,
    .settings-select:focus {
      border-color: #cccccc;
    }

    .settings-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 30px;
      padding: 0 12px;
      border: 1px solid #eeeeee;
      border-radius: 6px;
      color: #666666;
      background: #ffffff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .settings-btn:disabled {
      color: #999999;
      background: #f5f5f5;
      cursor: default;
    }

    .settings-btn.primary {
      color: #3e4cc4;
      border-color: rgba(62, 76, 196, 0.3);
      background: #f6f7ff;
    }

    .settings-list {
      display: grid;
      gap: 6px;
    }

    .settings-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 12px;
      min-height: 54px;
      padding: 12px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    .settings-row:last-child {
      border-bottom: 0;
    }

    .settings-row > div {
      min-width: 0;
    }

    .settings-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .settings-toggle {
      appearance: none;
      width: 19px;
      height: 19px;
      margin: 0;
      background: url("./icon/未选中.svg") center / contain no-repeat;
      cursor: pointer;
    }

    .settings-toggle:checked {
      background-image: url("./icon/方形选框.svg");
    }

    .settings-toggle:focus-visible {
      outline: 2px solid rgba(102, 109, 226, 0.32);
      outline-offset: 2px;
    }

    .settings-path {
      min-width: 0;
      color: #333333;
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .settings-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .settings-tag {
      display: inline-flex;
      align-items: center;
      height: 19px;
      padding: 0 6px;
      border-radius: 3px;
      color: #666666;
      background: #f5f5f5;
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    .settings-tag.warn {
      color: #ffad44;
      background: #fff4e7;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 36px;
      transform: translateX(-50%);
      display: none;
      max-width: min(720px, calc(100vw - 36px));
      padding: 12px 15px;
      border-radius: 8px;
      color: #ffffff;
      background: rgba(17, 24, 39, 0.92);
      font-size: 13px;
      box-shadow: 0 18px 36px rgba(16, 24, 40, 0.22);
    }

    .toast.show {
      display: block;
    }

    .delete-dialog-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.18);
    }

    .delete-dialog-overlay.is-open {
      display: flex;
    }

    .delete-dialog {
      width: min(320px, 100%);
      padding: 24px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.08);
    }

    .delete-dialog-copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    .delete-dialog-title {
      margin: 0;
      color: #333333;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      word-break: break-word;
    }

    .delete-dialog-desc {
      margin: 0;
      color: #666666;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.66;
      word-break: break-word;
    }

    .delete-dialog-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-top: 24px;
    }

    .delete-dialog-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 124px;
      height: 35px;
      border: 0;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
      cursor: pointer;
    }

    .delete-dialog-btn.cancel {
      color: #5661d1;
      background: #f6f7ff;
    }

    .delete-dialog-btn.confirm {
      color: #ffffff;
      background: linear-gradient(155deg, #ff724b 0%, #e62828 100%);
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .workspace {
        padding: 18px;
      }

      .app-frame {
        display: block;
        width: 100%;
        height: auto;
        min-height: calc(100vh - 36px);
        padding: 18px;
      }

      .sidebar {
        margin-bottom: 18px;
        padding: 12px;
      }

      .mode-nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filter-bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
      }

      .filter-tabs {
        width: 100%;
      }

      .card-scroll {
        max-height: none;
        overflow: visible;
        padding-right: 0;
      }

      .filter-actions {
        width: 100%;
        justify-content: flex-end;
      }

      .skill-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="workspace">
    <section class="app-frame" aria-label="Skill Tidy">
      <img class="app-logo" src="./icon/logo-top.png" alt="Agent Skill Management">
      <aside class="sidebar">
        <nav class="mode-nav" id="modeNav" aria-label="Skill 筛选类型">
          <button class="mode-item is-active" type="button" data-mode="category">
            <span class="mode-icon" aria-hidden="true">
              <img src="./icon/leixing.svg" alt="">
            </span>
            <span>技能类型</span>
          </button>
          <button class="mode-item" type="button" data-mode="platform">
            <span class="mode-icon" aria-hidden="true">
              <img src="./icon/pingtai.svg" alt="">
            </span>

        desc: "创建和脚手架化 Codex plugin 目录与 manifest。",
        path: "/Users/brainwung/.codex/skills/.system/plugin-creator"
      },
      {
        category: "Codex / 系统工具",
        name: "template-creator",
        folder: "openai-primary-runtime/template-creator",
        source: "内置",
        status: "内置",
        desc: "创建或更新可复用的个人 Codex artifact-template skill。",
        path: "/Users/brainwung/.codex/plugins/cache/openai-primary-runtime/template-creator"
      },
      {
        category: "浏览器 / 桌面控制",
        name: "control-in-app-browser",
        folder: "openai-bundled/browser",
        source: "内置",
        status: "内置",
        desc: "控制 Codex 内置浏览器，打开页面、点击、截图和验证本地预览。",
        path: "/Users/brainwung/.codex/plugins/cache/openai-bundled/browser"
      },
      {
        category: "浏览器 / 桌面控制",
        name: "control-chrome",
        folder: "openai-bundled/chrome",
        source: "内置",
        status: "内置",
        desc: "控制用户 Chrome 浏览器，适合依赖登录态或现有标签页的任务。",
        path: "/Users/brainwung/.codex/plugins/cache/openai-bundled/chrome"
      },
      {
        category: "浏览器 / 桌面控制",
        name: "computer-use",
        folder: "openai-bundled/computer-use",
        source: "内置",
        status: "内置",
        desc: "通过点击、输入、滚动等方式操作本地 Mac 应用界面。",
        path: "/Users/brainwung/.codex/plugins/cache/openai-bundled/computer-use"
      }
    ];

    const sourceClass = {
      "自制": "self",
      "下载": "download",
      "内置": "builtin"
    };

    const platformClass = {
      "Codex": "codex",
      "Claude": "claude",
      "Claude Code": "claude-code",
      "Cursor": "cursor",
      "Windsurf": "windsurf",
      "Continue": "continue",
      "Gemini": "gemini",
      "OpenCode": "opencode"
    };

    const categoryLabels = {
      "设计系统 / 组件规范": "设计规范",
      "文档 / PPT / 白板": "文档演示",
      "视觉生成 / 审美方向": "视觉生成",
      "前端实现 / 改版": "前端实现",
      "Figma / 设计文件工作流": "Figma",
      "Notion / 文档协作": "Notion",
      "Codex / 系统工具": "系统工具",
      "浏览器 / 桌面控制": "浏览器"
    };

    let activeMode = "category";
    let activeFilter = "all";
    let settingsRoots = [];
    let settingsLoaded = false;
    const skillsCacheKey = "skill-tidy.skills-cache.v1";

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function folderHref(path) {
      return encodeURI("file://" + path);
    }

    function folderIcon() {
      return `<img src="./icon/articel-manage.svg" alt="">`;
    }

    function repoPathFromCommand(command) {
      const match = String(command || "").match(/^cd\s+(.+?)\s+&&/);
      return match ? match[1] : "";
    }

    function cleanRootPath(value) {
      const text = String(value || "").trim();
      return text.length > 1 ? text.replace(/\/+$/, "") : text;
    }

    function categoryLabel(category) {
      return categoryLabels[category] || category;
    }

    function platformLabel(platform) {
      return platform || "Codex";
    }

    function categoryOptions(baseSkills = skills) {
      const seen = new Set();
      const options = [];
      baseSkills.forEach((item) => {
        if (!item.category || seen.has(item.category)) return;
        seen.add(item.category);
        options.push({
          value: item.category,
          label: categoryLabel(item.category)
        });
      });
      return options;
    }

    function platformOptions() {
      return Array.from(new Set(skills.map((item) => platformLabel(item.platform))))
        .map((platform) => ({ value: platform, label: platform }));
    }

    function sourceOptions() {
      const sourceOrder = ["内置", "下载", "自制"];
      const existing = new Set(skills.map((item) => item.source));
      return sourceOrder
        .filter((source) => existing.has(source))
        .map((source) => ({ value: source, label: source }));
    }

    function baseSkillsForMode() {
      if (activeMode === "settings") return [];
      return activeMode === "mine"
        ? skills.filter((item) => item.source === "自制")
        : skills;
    }

    function filterOptions() {
      if (activeMode === "settings") return [];
      if (activeMode === "platform") return platformOptions();
      if (activeMode === "source") return sourceOptions();
      return categoryOptions(baseSkillsForMode());
    }

    function syncActiveFilter() {
      const optionValues = filterOptions().map((item) => item.value);
      if (activeFilter !== "all" && !optionValues.includes(activeFilter)) {
        activeFilter = "all";
      }
    }

    function visibleSkills() {
      const items = baseSkillsForMode();
      if (activeFilter === "all") return items;

      if (activeMode === "platform") {
        return items.filter((item) => platformLabel(item.platform) === activeFilter);
      }

      if (activeMode === "source") {
        return items.filter((item) => item.source === activeFilter);
      }

      return items.filter((item) => item.category === activeFilter);
    }

    function renderModeNav() {
      document.querySelectorAll("#modeNav .mode-item").forEach((item) => {
        item.classList.toggle("is-active", item.dataset.mode === activeMode);
      });
    }

    function renderFilterTabs() {
      const filterBar = document.querySelector(".filter-bar");
      if (filterBar) {
        filterBar.classList.toggle("is-hidden", activeMode === "settings");
      }

      if (activeMode === "settings") {
        document.getElementById("filterTabs").innerHTML = "";
        return;
      }
      syncActiveFilter();
      const options = [{ value: "all", label: "全部" }, ...filterOptions()];
      const html = options.map((item) => {
        const activeClass = item.value === activeFilter ? " is-active" : "";
        const label = escapeHtml(item.label);
        return `<button class="filter-tab${activeClass}" type="button" data-filter="${escapeHtml(item.value)}" data-label="${label}"><span>${label}</span></button>`;
      }).join("");
      document.getElementById("filterTabs").innerHTML = html;
    }

    function renderSettingsLoading() {
      document.getElementById("sections").innerHTML = `
        <section class="settings-panel">
          <div class="settings-card">
            <h2 class="settings-title">正在读取目录设置</h2>
            <p class="settings-desc">请稍候。</p>
          </div>
        </section>
      `;
    }

    function renderSettings() {
      renderModeNav();
      renderFilterTabs();

      const rows = settingsRoots.map((item, index) => `
        <div class="settings-row" data-settings-index="${index}">
          <div>
            <div class="settings-path" title="${escapeHtml(item.path)}">${escapeHtml(item.path)}</div>
            <div class="settings-meta">
              <span class="settings-tag">${escapeHtml(item.platform || "自定义")}</span>
              <span class="settings-tag">${escapeHtml(item.source || "自定义")}</span>
              ${item.pending ? `<span class="settings-tag">待保存</span>` : item.exists ? "" : `<span class="settings-tag warn">不存在</span>`}
              ${item.builtin ? `<span class="settings-tag">内置</span>` : ""}
            </div>
          </div>
          <div class="settings-actions">
            <input class="settings-toggle" type="checkbox" ${item.enabled ? "checked" : ""} aria-label="启用目录">
            ${item.source === "自定义"
              ? `<button class="settings-btn" type="button" data-remove-root="${index}">移除</button>`
              : ""}
          </div>
        </div>
      `).join("");

      document.getElementById("sections").innerHTML = `
        <section class="settings-panel">
          <div class="settings-card">
            <div class="settings-head">
              <div>
                <h2 class="settings-title">Skill 扫描目录</h2>
                <p class="settings-desc">管理本机各 agent 的 skill 根目录，保存后会重新扫描列表。</p>
              </div>
              <button class="settings-btn primary" type="button" id="saveSettings">保存</button>
            </div>
            <div class="settings-form">
              <input class="settings-input" id="newRootPath" type="text" placeholder="新增目录路径，例如 ~/.custom/skills">
              <select class="settings-select" id="newRootPlatform">
                <option>Codex</option>
                <option>Claude</option>
                <option>Claude Code</option>
                <option>Cursor</option>
                <option>Windsurf</option>
                <option>Continue</option>
                <option>Gemini</option>
                <option>OpenCode</option>
                <option>自定义</option>
              </select>
              <button class="settings-btn" type="button" id="addRoot">添加</button>
            </div>
            <div class="settings-list">
              ${rows || `<p class="settings-desc">暂无目录。</p>`}
            </div>
          </div>
        </section>
      `;
      renderStats();
    }

    function renderStats() {
      if (!document.getElementById("statSelf")) return;
      const items = visibleSkills();
      const selfCount = items.filter((item) => item.source === "自制").length;
      const downloadCount = items.filter((item) => item.source === "下载").length;
      const updateCount = items.filter((item) => String(item.status).startsWith("可更新")).length;

      document.getElementById("statSelf").textContent = selfCount;
      document.getElementById("statDownload").textContent = downloadCount;
      document.getElementById("statUpdate").textContent = updateCount;
    }

    function renderUpdatedAt(value) {
      if (!value) return;
      const date = new Date(value);
      const text = Number.isNaN(date.getTime())
        ? value
        : date.toLocaleString("zh-CN", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
          });
      document.getElementById("updatedAt").textContent = "更新时间：" + text;
    }

    function renderLoading() {
      document.getElementById("sections").innerHTML = `
        <div class="skill-grid">
          <article class="skill-card">
            <div class="skill-title">
              <span class="skill-name">正在扫描</span>
            </div>
            <div class="tag-row">
              <span class="status clean">请稍候</span>
            </div>
            <p class="desc">正在重新读取本机各个 agent 的 skill 目录。</p>
          </article>
        </div>
      `;
    }

    function cardMarkup(item) {
      const hasUpdate = item.status.startsWith("可更新");
      const statusTag = item.status === item.source
        ? ""
        : `<span class="status ${hasUpdate ? "update" : "clean"}">${escapeHtml(item.status)}</span>`;
      const repoPath = repoPathFromCommand(item.command);
      const githubUrl = item.githubUrl || "";
      const cardClass = githubUrl ? "skill-card has-github" : "skill-card";
      const cardAttrs = githubUrl
        ? ` data-github-url="${escapeHtml(githubUrl)}" title="打开 GitHub 仓库"`
        : "";
      const action = hasUpdate
        ? `<button class="update-btn" data-command="${escapeHtml(item.command)}" data-repo="${escapeHtml(repoPath)}">更新</button>`
        : `<button class="update-btn" disabled>更新</button>`;
      const deleteAction = item.deletable
        ? `<button class="delete-btn" data-path="${escapeHtml(item.path)}" data-name="${escapeHtml(item.name)}">删除</button>`
        : "";

      return `
        <article class="${cardClass}"${cardAttrs}>
          <div class="skill-title">
            <span class="skill-name">${escapeHtml(item.name)}</span>
            <a class="folder-link" href="${folderHref(item.path)}" target="_blank" title="打开所在文件夹：${escapeHtml(item.path)}">${folderIcon()}</a>
          </div>
          <div class="tag-row">
            <span class="platform ${platformClass[item.platform || "Codex"] || ""}">${escapeHtml(item.platform || "Codex")}</span>
            <span class="pill ${sourceClass[item.source]}">${escapeHtml(item.source)}</span>
            ${statusTag}
          </div>
          <p class="desc">${escapeHtml(item.desc)}</p>
          <div class="card-actions">
            ${action}
            ${deleteAction}
          </div>
        </article>
      `;
    }

    function render() {
      if (activeMode === "settings") {
        renderSettings();
        return;
      }

      renderModeNav();
      renderFilterTabs();

      const items = visibleSkills();
      const html = items.length
        ? `<div class="skill-grid">${items.map(cardMarkup).join("")}</div>`
        : `
          <div class="skill-grid">
            <article class="skill-card">
              <div class="skill-title">
                <span class="skill-name">暂无内容</span>
              </div>
              <div class="tag-row">
                <span class="status clean">0 个</span>
              </div>
              <p class="desc">当前筛选条件下没有找到对应的 skill。</p>
            </article>
          </div>
        `;

      document.getElementById("sections").innerHTML = html;
      renderStats();
    }

    function bindScrollSpy() {
      renderModeNav();
    }

    function scrollCardsToTop() {
      const scroller = document.getElementById("cardScroll");
      if (scroller) scroller.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function loadCachedSkills() {
      try {
        const cached = JSON.parse(localStorage.getItem(skillsCacheKey) || "null");
        if (!cached || !Array.isArray(cached.skills)) return false;
        skills = cached.skills;
        if (cached.updatedAt) renderUpdatedAt(cached.updatedAt);
        return true;
      } catch (error) {
        return false;
      }
    }

    function cacheSkills(result) {
      try {
        localStorage.setItem(skillsCacheKey, JSON.stringify({
          skills: result.skills || [],
          updatedAt: result.updatedAt || new Date().toISOString()
        }));
      } catch (error) {
        // Ignore cache failures; the app can still render from the live scan.
      }
    }

    function confirmDelete(name) {
      const dialog = document.getElementById("deleteDialog");
      const title = document.getElementById("deleteDialogTitle");
      title.textContent = `确认删除 ${name}?`;
      dialog.classList.add("is-open");
      dialog.setAttribute("aria-hidden", "false");

      return new Promise((resolve) => {
        const close = (value) => {
          dialog.classList.remove("is-open");
          dialog.setAttribute("aria-hidden", "true");
          dialog.removeEventListener("click", onClick);
          document.removeEventListener("keydown", onKeydown);
          resolve(value);
        };

        const onClick = (event) => {
          if (event.target === dialog || event.target.closest("[data-delete-dialog-cancel]")) {
            close(false);
            return;
          }
          if (event.target.closest("[data-delete-dialog-confirm]")) {
            close(true);
          }
        };

        const onKeydown = (event) => {
          if (event.key === "Escape") {
            close(false);
          }
        };

        dialog.addEventListener("click", onClick);
        document.addEventListener("keydown", onKeydown);
      });
    }

    async function refreshSkills(options = {}) {
      const button = document.getElementById("refreshList");
      const useButtonState = !options.background;
      if (location.protocol === "file:") {
        showToast("需要通过本地服务打开，才能重新扫描 skill 目录");
        return;
      }

      if (useButtonState) {
        button.classList.add("is-loading");
        button.disabled = true;
        button.textContent = "扫描中";
      }

      try {
        const response = await fetch("/api/skills", { cache: "no-store" });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "刷新失败");
        }
        skills = result.skills;
        cacheSkills(result);
        render();
        renderUpdatedAt(result.updatedAt);
        bindScrollSpy();
        if (!options.silent) {
          showToast("列表已刷新，新增和删除的 skill 已同步");
        }
      } catch (error) {
        if (!options.silent) {
          showToast(error.message || "刷新失败");
        }
        if (options.fallback) {
          render();
          bindScrollSpy();
        }
      } finally {
        if (useButtonState) {
          button.classList.remove("is-loading");
          button.disabled = false;
          button.textContent = "刷新";
        }
      }
    }

    async function loadSettings() {
      if (location.protocol === "file:") {
        showToast("需要通过本地服务打开，才能读取设置");
        return;
      }

      renderSettingsLoading();
      try {
        const response = await fetch("/api/settings", { cache: "no-store" });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "读取设置失败");
        }
        settingsRoots = result.roots || [];
        settingsLoaded = true;
        renderSettings();
      } catch (error) {
        showToast(error.message || "读取设置失败");
        settingsLoaded = true;
        settingsRoots = [];
        renderSettings();
      }
    }

    async function saveSettings() {
      if (location.protocol === "file:") {
        showToast("需要通过本地服务打开，才能保存设置");
        return;
      }

      try {
        const response = await fetch("/api/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ roots: settingsRoots })
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "保存失败");
        }
        settingsRoots = result.roots || [];
        renderSettings();
        await refreshSkills({ silent: true });
        activeMode = "settings";
        renderSettings();
        showToast("目录设置已保存，列表已重新扫描");
      } catch (error) {
        showToast(error.message || "保存失败");
      }
    }

    document.getElementById("refreshList").addEventListener("click", () => refreshSkills());

    document.getElementById("modeNav").addEventListener("click", (event) => {
      const button = event.target.closest(".mode-item[data-mode]");
      if (!button) return;
      activeMode = button.dataset.mode || "category";
      activeFilter = "all";
      if (activeMode === "settings" && !settingsLoaded) {
        renderModeNav();
        renderFilterTabs();
        loadSettings();
        scrollCardsToTop();
        return;
      }
      render();
      bindScrollSpy();
      scrollCardsToTop();
    });

    document.getElementById("filterTabs").addEventListener("click", (event) => {
      const button = event.target.closest(".filter-tab[data-filter]");
      if (!button) return;
      activeFilter = button.dataset.filter || "all";
      render();
      bindScrollSpy();
      scrollCardsToTop();
    });

    document.addEventListener("click", async (event) => {
      const addRootButton = event.target.closest("#addRoot");
      if (addRootButton) {
        const input = document.getElementById("newRootPath");
        const platform = document.getElementById("newRootPlatform").value || "自定义";
        const rootPath = cleanRootPath(input.value);
        if (!rootPath) {
          showToast("请先填写目录路径");
          input.focus();
          return;
        }

        const exists = settingsRoots.some((item) => cleanRootPath(item.path) === rootPath);
        if (exists) {
          showToast("这个目录已经在列表里了");
          input.focus();
          return;
        }

        settingsRoots.push({
          path: rootPath,
          platform,
          source: "自定义",
          builtin: false,
          deletable: true,
          enabled: true,
          pending: true
        });
        input.value = "";
        renderSettings();
        return;
      }

      const removeRootButton = event.target.closest("[data-remove-root]");
      if (removeRootButton) {
        const index = Number(removeRootButton.dataset.removeRoot);
        if (!Number.isNaN(index)) {
          settingsRoots.splice(index, 1);
          renderSettings();
        }
        return;
      }

      const saveSettingsButton = event.target.closest("#saveSettings");
      if (saveSettingsButton) {
        saveSettingsButton.disabled = true;
        saveSettingsButton.textContent = "保存中";
        try {
          await saveSettings();
        } finally {
          const currentButton = document.getElementById("saveSettings");
          if (currentButton) {
            currentButton.disabled = false;
            currentButton.textContent = "保存";
          }
        }
        return;
      }

      const card = event.target.closest(".skill-card[data-github-url]");
      if (card && !event.target.closest("a, button")) {
        window.open(card.dataset.githubUrl, "_blank", "noopener");
        return;
      }

      const deleteButton = event.target.closest(".delete-btn[data-path]");
      if (deleteButton) {
        const name = deleteButton.dataset.name || "这个 skill";
        const confirmed = await confirmDelete(name);
        if (!confirmed) return;

        if (location.protocol === "file:") {
          showToast("需要通过本地服务打开，才能删除 skill");
          return;
        }

        deleteButton.classList.add("is-loading");
        deleteButton.disabled = true;
        deleteButton.textContent = "删除中";

        try {
          const response = await fetch("/api/delete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: deleteButton.dataset.path })
          });
          const result = await response.json();
          if (!response.ok || !result.ok) {
            throw new Error(result.message || "删除失败");
          }
          showToast("已删除并移动到备份目录");
          refreshSkills({ silent: true });
        } catch (error) {
          showToast(error.message || "删除失败");
          deleteButton.disabled = false;
          deleteButton.textContent = "删除";
        } finally {
          deleteButton.classList.remove("is-loading");
        }
        return;
      }

      const button = event.target.closest(".update-btn[data-command]");
      if (!button) return;
      const command = button.dataset.command;
      const repo = button.dataset.repo;

      if (location.protocol === "file:") {
        try {
          await navigator.clipboard.writeText(command);
          showToast("静态打开不能直接更新，已复制命令：" + command);
        } catch (error) {
          showToast(command);
        }
        return;
      }

      button.classList.add("is-loading");
      button.disabled = true;
      button.textContent = "更新中";

      try {
        const response = await fetch("/api/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ repo })
        });
        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "更新失败");
        }
        showToast(result.message || "更新完成");
        button.textContent = "已更新";
        refreshSkills({ silent: true });
      } catch (error) {
        showToast(error.message || "更新失败");
        button.disabled = false;
        button.textContent = "更新";
      } finally {
        button.classList.remove("is-loading");
      }
    });

    document.addEventListener("change", (event) => {
      const toggle = event.target.closest(".settings-toggle");
      if (!toggle) return;
      const row = toggle.closest("[data-settings-index]");
      const index = Number(row?.dataset.settingsIndex);
      if (Number.isNaN(index) || !settingsRoots[index]) return;
      settingsRoots[index].enabled = toggle.checked;
    });

    if (location.protocol !== "file:") {
      loadCachedSkills();
      render();
      bindScrollSpy();
      refreshSkills({ silent: true, background: true });
    } else {
      render();
      bindScrollSpy();
    }
  </script>
</body>
</html>
